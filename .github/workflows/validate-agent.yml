name: Validate Dialogflow CX Agent

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  local-schema:
    name: Local Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate JSON syntax
        run: |
          errors=0
          while IFS= read -r f; do
            if ! python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "❌ Invalid JSON: $f"
              python3 -m json.tool "$f" 2>&1 | head -5
              errors=$((errors + 1))
            fi
          done < <(find . -name "*.json" -type f)
          if [ $errors -gt 0 ]; then exit 1; fi
          echo "✅ All JSON files syntactically valid"
      - name: Validate agent schema
        run: python3 scripts/validate-agent.py
      - name: Validate cross-references
        run: python3 scripts/validate-references.py

  cx-validation-api:
    name: Dialogflow CX Validation API
    runs-on: ubuntu-latest
    needs: local-schema
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    env:
      CX_API_PROJECT: superb-tendril-409615
      CX_API_LOCATION: us-central1
      CX_API_AGENT_ID: 5c1fa4bf-24b8-4dc6-8de4-91da9aa7e165
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/921064029774/locations/global/workloadIdentityPools/github/providers/github
          service_account: github-ci@superb-tendril-409615.iam.gserviceaccount.com

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install google-cloud-dialogflow-cx

      - name: Restore & validate via CX API
        run: python3 scripts/validate-cx-api.py
